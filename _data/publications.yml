- id: tiago-humanoid
  title: "Improving Operational Accuracy of a Mobile Manipulator by Modeling Geometric and Non-Geometric Parameters"
  venue: 2024 IEEE-RAS 23rd International Conference on Humanoid Robots (Humanoids) - Nancy, France
  description: "This paper improves mobile manipulator accuracy by modeling geometric and non-geometric parameters including base suspension and joint backlash, achieving 60% better end-effector pose estimation on the TIAGo robot."
